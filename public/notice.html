<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notices</title>
  <link rel="stylesheet" href="/style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  
  <style>
    .notice-wrap { max-width: 900px; margin: 30px auto; padding: 0 16px; }
    .notice-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:16px; margin-bottom:12px; }
    .notice-title { margin:0 0 8px; color:#0a2d57; }
    .notice-date { font-size:12px; color:#6b7280; margin-bottom:8px; }
    .notice-image { cursor: pointer; border-radius: 8px; transition: transform 0.2s ease; }
    .notice-image:hover { transform: scale(1.02); }

    .fullscreen-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .fullscreen-modal.active {
      display: flex;
    }

    .fullscreen-modal-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fullscreen-modal-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .fullscreen-modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .fullscreen-modal-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <section class="notice-page">
    <div class="notice-wrap">
      <div class="notice-page-heading">
        <h1>Notice Board</h1>
        <p>Latest announcements loaded from the upload system.</p>
      </div>
      <div id="noticeList">Loading notices...</div>
    </div>
  </section>

  <!-- Fullscreen Image Modal -->
  <div id="fullscreenModal" class="fullscreen-modal">
    <div class="fullscreen-modal-content">
      <button class="fullscreen-modal-close" id="closeFullscreen" aria-label="Close fullscreen">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <img id="fullscreenImage" class="fullscreen-modal-image" alt="Fullscreen notice image" />
    </div>
  </div>

  <div id="footer-root"></div>

  <script src="/script.js"></script>
  <script>
    // Fullscreen image viewer for notices
    const fullscreenModal = document.getElementById('fullscreenModal');
    const fullscreenImage = document.getElementById('fullscreenImage');
    const closeBtn = document.getElementById('closeFullscreen');

    // Close modal on close button click
    closeBtn.addEventListener('click', () => {
      fullscreenModal.classList.remove('active');
    });

    // Close modal on background click
    fullscreenModal.addEventListener('click', (e) => {
      if (e.target === fullscreenModal) {
        fullscreenModal.classList.remove('active');
      }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && fullscreenModal.classList.contains('active')) {
        fullscreenModal.classList.remove('active');
      }
    });

    // Function to open fullscreen image
    function openFullscreenImage(imageSrc) {
      fullscreenImage.src = imageSrc;
      fullscreenModal.classList.add('active');
    }

    // Add event listeners to notice images (this will be called after notices are loaded)
    function attachImageListeners() {
      const noticeImages = document.querySelectorAll('.notice-image');
      noticeImages.forEach(img => {
        img.addEventListener('click', () => {
          openFullscreenImage(img.src);
        });
      });
    }

    // Observe for changes in the notice list and attach listeners
    const noticeList = document.getElementById('noticeList');
    const observer = new MutationObserver(() => {
      attachImageListeners();
    });

    observer.observe(noticeList, { childList: true, subtree: true });

    // Initial attachment
    attachImageListeners();
  </script>
</body>
</html>
