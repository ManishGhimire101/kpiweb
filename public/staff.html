<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
</head>
<body>
  <div id="navbar-root"></div>

  <section class="page-hero page-hero-staff">
    <div class="page-hero-content">
      <span class="page-badge">Staff Profiles</span>
      <h1>Our People</h1>
      <p>Meet the staff team and browse profile cards loaded from the upload database.</p>
    </div>
  </section>

  <section class="content-section">
    <div class="section-shell">
      <div class="section-heading">
        <h2>Staff Profiles</h2>
        <p>Each profile card can include an image, title, and longer details with a see-more toggle.</p>
      </div>

      <div id="staffGrid" class="staff-grid">
        <p class="empty-message">Loading staff profiles...</p>
      </div>
    </div>
  </section>

  <div id="footer-root"></div>
  <script src="/script.js"></script>
</body>
</html>
