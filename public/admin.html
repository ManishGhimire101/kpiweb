<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --card: #ffffff;
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe4ff;
      --success-bg: #ecfdf3;
      --success-text: #166534;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .admin-hero {
      background: linear-gradient(130deg, var(--primary-dark), var(--primary));
      color: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(30, 58, 138, 0.25);
      margin-bottom: 18px;
    }

    .admin-hero h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      margin-bottom: 8px;
    }

    .admin-hero p {
      opacity: 0.95;
      line-height: 1.6;
      max-width: 700px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(29, 78, 216, 0.08);
      padding: 22px;
    }

    .card h2 {
      color: var(--primary-dark);
      margin-bottom: 14px;
      font-size: 1.2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.92rem;
      font-weight: 700;
      color: #334155;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      border: 1px solid #c9d8ff;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.14);
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: none;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
      font-weight: 700;
      padding: 11px 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(30, 58, 138, 0.25);
    }

    #msg {
      margin-top: 12px;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 600;
      display: none;
    }

    #msg.success {
      display: block;
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #bbf7d0;
    }

    #msg.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #fecaca;
    }

    .help {
      font-size: 0.86rem;
      color: var(--muted);
      margin-top: 4px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      body {
        padding: 16px 12px;
      }

      .card,
      .admin-hero {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="admin-hero">
      <h1>Admin Upload Dashboard</h1>
      <p>
        Add banners, notices, staff images, and gallery items quickly.
        Fill in the form below and submit to publish content.
      </p>
    </section>

    <section class="card">
      <h2>Upload Content</h2>

      <form id="uploadForm">
        <div class="grid">
          <div class="field">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="home">Home</option>
                <option value="about">About</option>
              <option value="notices">Notices</option>
              <option value="staff">Staff</option>
              <option value="gallary">Gallary</option>
            </select>
          </div>

          <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Enter title (optional)" />
          </div>

          <div class="field full">
            <label for="details">Details</label>
            <textarea id="details" placeholder="Write short details (optional)"></textarea>
          </div>

          <div class="field full">
            <label for="image">Image</label>
            <input type="file" id="image" accept="image/*" required />
            <p class="help">Supported: jpg, png, webp. Please upload clear images.</p>
          </div>
        </div>

        <div class="actions">
          <button type="submit">Upload Now</button>
        </div>
      </form>

      <p id="msg" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('uploadForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      msg.className = '';
      msg.textContent = 'Uploading...';
      msg.classList.add('success');

      const category = document.getElementById('category').value;
      const title = document.getElementById('title').value;
      const details = document.getElementById('details').value;
      const image = document.getElementById('image').files[0];

      const data = new FormData();
      data.append('title', title);
      data.append('details', details);
      data.append('image', image);

      try {
        const res = await fetch(`/api/admin/upload/${category}`, {
          method: 'POST',
          body: data
        });

        const result = await res.json();

        if (!res.ok) {
          msg.className = 'error';
          msg.textContent = result.message || 'Upload failed';
          return;
        }

        msg.className = 'success';
        msg.textContent = result.message || 'Upload completed successfully';
        form.reset();
      } catch (error) {
        msg.className = 'error';
        msg.textContent = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
